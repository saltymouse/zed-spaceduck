name: Publish to zed-industries/extensions

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: huacnlee/zed-extension-action@v1
        with:
          extension-name: spaceduck
        env:
          COMMITTER_TOKEN: ${{ secrets.COMMITTER_TOKEN }}
